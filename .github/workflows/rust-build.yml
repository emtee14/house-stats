name: Rust Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "data-loader/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "data-loader/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: data-loader

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose