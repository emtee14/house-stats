apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared

spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared

  template:
    metadata:
      labels:
        app: cloudflared

    spec:
      containers:
        - name: cloudflared
          image: docker.io/cloudflare/cloudflared:latest
          args: ["tunnel", "--config", "/etc/cloudflared/config.yaml", "run"]

          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared

      volumes:
        - name: config
          secret:
            secretName: cloudflared-secret