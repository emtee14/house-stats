apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service

spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api
          image: ghcr.io/emtee14/house-stats-web-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: DATABASE_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: REDIS_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: REDIS_URL
            - name: STRIPE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_API_TOKEN
            - name: STRIPE_TOKEN_PRODUCT_ID
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: STRIPE_TOKEN_PRODUCT_ID
            - name: JWT_ALGORITHM
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: JWT_ALGORITHM
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: SECRET_KEY
      imagePullSecrets:
        - name: ghcr-secret
